项目: 星耀片场
形式: SillyTavern 角色卡消息楼层 React iframe
MVU:
  启用: true
  事实来源: 当前消息楼层 stat_data
  数值制式:
    五段制: [演出经验, 好感度, 堕落度]
    百分制: [敏感点开发度, 快感值, 体力值, 作品完成度]
  前端写入:
    - 经济与债务
    - 演员与实时状态
    - 背包与商店
    - 拍摄与过往作品
    - 任务、成就、街道治安与操作队列
  本地设置:
    - API 配置与独立提示词
    - 自定义题材 Tag 与隐藏内置 Tag
  兼容策略: 保留现有字段，新增前端必需字段，不重命名旧变量
实施阶段:
  - 恢复并校验 schema.ts、initvar、变量更新规则
  - 建立类型安全 MVU 适配层
  - 接入全部经营交互
  - 接入 Tag、剧本、市场刷新
  - 新增经营事务页并全量回归
  - 拆分片场成就导航页，并以 MVU 街道治安驱动顶部概览
  - 重构男优女优管理信息层级，展示身体数据、当前服饰与当前身体状态
  - 取消片场知名度，并将演员身份资料统一从 MVU 基本信息读取
  - 恢复演员资料的紧凑排版，并允许通过确认弹窗修改女优与男优艺名后回写当前楼层 MVU
  - 为进行中的经营任务提供放弃操作，并将放弃行为写入 MVU 行动简报
- 为男女演员接入特殊癖好与擅长题材，并按女优题材匹配高亮企划、剧本与预计收入加成
- 修复消息楼层变量未初始化时面板入口无限等待导致的 iframe 空白问题
- 移除题材与演员偏好相关变量和界面，剧本仅以知名度要求与片酬衡量
- 为男优接入演出经验；剧本使用等级与知名度门槛，新增可独立刷新的私人委托，并以男女演员经验参与最终片酬结算
- 将剧本等级固定为 D/C/B/A/S，知名度限制为 0–1000，并按 D:0–199、C:200–399、B:400–599、A:600–799、S:800–1000 匹配可接剧本
