---
变量更新规则:
  界面设置:
    主题:
      check:
        - 仅由前端设置页切换，AI 不主动修改
    控制台展开:
      type: boolean
      check:
        - 仅由前端展开/收起按钮修改

  制作人:
    名称:
      check:
        - 保持为 <<<<<user>>>>> 或玩家明确设定的制作人名
    等级:
      type: number
      check:
        - 经验值达到下级所需经验后提升
    经验值:
      type: number
      check:
        - 完成任务、发行作品、达成成就后增加
    下级所需经验:
      type: number
      check:
        - 随等级提升递增

  全局状态:
    日期时间:
      当前日期:
        format: YYYY年MM月DD日
        check:
          - 每次事件推进、休息或时间跳转后更新
      当前时间:
        format: HH:MM
        check:
          - 根据场景内活动时长推进，精确到分钟
    位置:
      当前所在地点:
        check:
          - 角色移动到新地点、切换拍摄场地或进入商店时更新
    街道治安:
      type: '动荡 | 戒备 | 安定'
      check:
        - 仅在治安事件、黑市交易后果或剧情明确影响街区秩序时更新
        - 无明确事件时保持当前等级，不以数字表示
    知名度:
      type: number
      range: 0~1000
      check:
        - 作品发行、任务结果和重大经营事件可改变知名度
        - 数值必须限制在0到1000之间
    经济:
      现有余额:
        type: number
        check:
          - 购买商品、还款时减少；完成任务、发行作品时增加
      欠债系统:
        当前所处阶段:
          type: number
          range: 1~13
          check:
            - 当前阶段还款满4次后进入下一阶段
        当前阶段已还款次数:
          type: number
          range: 0~4
          check:
            - 每次成功还款+1，阶段完成后归零
        当前阶段每次还款金额:
          type: number
          check:
            - 按阶段递增，阶段内保持不变
        下次还款日期:
          format: YYYY年MM月DD日
          check:
            - 成功还款后更新为下一次还款日
        当前欠款逾期次数:
          type: number
          range: 0~2
          check:
            - 到期未还款时+1，达到2次触发失败走向
        总已还款次数:
          type: number
          range: 0~52
          check:
            - 每次成功还款累计+1
        总获利:
          type: number
          check:
            - 每部作品结算时增加对应获利
        剩余欠债总额:
          type: number
          check:
            - 每次还款后减少，最低为0
      逾期机制:
        当前逾期女优:
          type: |-
            {
              [角色名: string]: {
                征用日期: string;
                预计归还日期: string;
              }
            }
          check:
            - 逾期征用发生时加入，归还后移除
            - 被征用期间当前是否在场为 false，不能参与拍摄

  女优:
    基本信息:
      是否已签约:
        type: boolean
        check:
          - 完成签约后设为 true
      已拍摄AV部数:
        type: number
        check:
          - 每完成并发行一部作品+1
    数值系统:
      ${演出经验|好感度|堕落度}:
        type: number
        range: 0~99
        check:
          - 根据剧情、训练、拍摄和制作人行为调整，每次通常变化±1
      快感值:
        type: number
        range: 0~100
        check:
          - 仅在对应场景内作为即时值更新，场景结束后可下降或归零
      体力值:
        type: number
        range: 0~100
        check:
          - 数值越高代表体力越充足；0 为精疲力竭，100 为体力充沛
          - 拍摄、任务消耗；休息、补给恢复
    身体属性:
      ${口是否处女|小穴是否处女|后穴是否处女}:
        type: boolean
        check:
          - 只能从 true 变为 false，不能反向恢复
    性经历:
      ${与玩家性交次数|与其他男性性交次数}:
        type: number
        check:
          - 明确发生对应经历后才增加
    敏感点开发度:
      ${口穴|胸部|小穴|屁穴|足部}:
        type: number
        range: 0~99
        check:
          - 相关部位经历反复刺激或训练后提升
    实时状态:
      ${上装|下装|内衣|内裤|袜子|鞋子|饰品}:
        check:
          - 换装或脱下时更新；未穿着填“无”
      身体状态.${口穴|胸部|足部|小穴|屁穴}:
        check:
          - 根据当前场景留下的可见状态更新
      当前是否在场:
        type: boolean
        check:
          - 角色离开、休息、被征用或回到片场时更新
      当前想法:
        check:
          - 用一句贴近角色心理的中文描述当前想法

  男优:
    基本信息:
      已拍摄AV部数:
        type: number
        check:
          - 每完成并发行一部作品+1
    数值系统:
      演出经验:
        type: number
        range: 0~99
        check:
          - 通过拍摄、训练和剧情事件小幅变化
      体力值:
        type: number
        range: 0~100
        check:
          - 数值越高代表体力越充足；0 为精疲力竭，100 为体力充沛
          - 拍摄消耗，休息恢复
    实时状态:
      ${上装|下装|鞋子}:
        check:
          - 换装时更新
      当前想法:
        check:
          - 用一句贴近角色心理的中文描述当前想法

  背包管理:
    ${消耗品|情趣用品|衣物|特殊物品}:
      type: |-
        {
          [物品名: string]: {
            数量: number;
            描述: string;
            数值效果: string;
          }
        }
      check:
        - 获得物品时增加数量；使用后减少数量；数量为0时移除
        - 描述和数值效果保持中文、简洁、可用于前端展示

  商店:
    ${正常商品|成人商品|衣服|道具}:
      type: |-
        {
          [商品名: string]: {
            类型: string;
            价格: number;
            描述: string;
            数值效果: string;
          }
        }
      check:
        - 商品价格为非负数
        - 商品描述面向前端卡片展示，不写无意义占位

  AV拍摄系统:
    当前拍摄:
      是否拍摄中:
        type: boolean
        check:
          - 前端立项后设为 true，杀青结算后设为 false
      当前作品名称:
        check:
          - 开始新企划或选择情境后更新
      作品简介:
        check:
          - 概括企划卖点、场景和演员风格
      拍摄者:
        ${男优|女优}:
          type: string[]
          check:
            - 从当前可调度成员中选择
      企划步骤:
        演员:
          type: string[]
          check:
            - 对应前端已选演员
        情境:
          check:
            - 对应前端已选情境设定
        地点:
          check:
            - 对应前端已选拍摄地点
        服装道具:
          type: string[]
          check:
            - 对应前端已选服装与道具
        拍摄前准备:
          type: string[]
          check:
            - 对应前端已选准备项
      预计销量:
        type: number
        check:
          - 根据预计收入、市场热度和演员表现估算
      预计收入构成:
        ${演员号召|道具加成|风险扣减}:
          type: number
          check:
            - 由前端选择或剧情明确影响时更新
      目前拍摄摘要:
        check:
          - 每次拍摄推进后更新当前进展
      作品完成度:
        type: number
        range: 0~100
        check:
          - 拍摄推进时增加，达到100后转入过往作品并结算
      选中剧本ID:
        check:
          - 对应前端当前企划选择
      步骤日志:
        type: string[]
        check:
          - 记录当前作品最近的拍摄进展
    剧本管理:
      可选现成剧本:
        type: |-
          {
            [剧本名: string]: string | {
              ID: string;
              简介: string;
              所需男优数: number;
              所需女优数: number;
              基础质量: number;
              等级: 'D' | 'C' | 'B' | 'A' | 'S';
              所需知名度: number;
              预计报酬: number;
              拍摄要求: string[];
              来源: '预设' | 'AI' | '自拟' | '收藏' | '私人委托';
            }
          }
        check:
          - 剧本等级严格按所需知名度匹配：D为0~199、C为200~399、B为400~599、A为600~799、S为800~1000
          - 所需知名度不得超过当前制作人知名度
      私人委托:
        type: |-
          {
            [剧本名: string]: {
              ID: string;
              简介: string;
              所需男优数: number;
              所需女优数: number;
              基础质量: number;
              等级: 'D' | 'C' | 'B' | 'A' | 'S';
              所需知名度: number;
              预计报酬: number;
              拍摄要求: string[];
              来源: '私人委托';
            }
          }
        check:
          - 与可选现成剧本使用相同的知名度分级规则
      自行发挥:
        type: boolean
        check:
          - 玩家选择自由企划时设为 true
      剧本库:
        type: |-
          {
            [剧本名: string]: {
              ID: string;
              简介: string;
              所需男优数: number;
              所需女优数: number;
              基础质量: number;
              等级: 'D' | 'C' | 'B' | 'A' | 'S';
              所需知名度: number;
              预计报酬: number;
              拍摄要求: string[];
              来源: '预设' | 'AI' | '自拟' | '收藏' | '私人委托';
            }
          }
        check:
          - 仅由前端收藏或移除剧本时更新
    市场数据:
      热门服饰:
        type: string[]
        check:
          - 展示3到5个当前热门服饰关键词
      热门角色类型:
        type: string[]
        check:
          - 展示3到5个当前热门角色类型
    可选项:
      ${情境设定|地点选择|服装与道具|拍摄前准备}:
        type: string[]
        check:
          - 作为前端向导选项，保持短中文词组
    过往作品:
      type: |-
        {
          [作品名: string]: {
            评分: number;
            评价: string;
            总获利: number;
            上映日期: string;
            简介: string;
            观众评价: string[];
            男优: string[];
            女优: string[];
            上映后天数: number;
          }
        }
      check:
        - 作品完成后加入，保留最近8部
        - 评分范围0~10，观众评价2到4条

  任务系统:
    ${悬赏大厅|自选任务|进行中|已完成}:
      type: |-
        {
          [任务ID: string]: {
            标题: string;
            Rank: string;
            描述: string;
            奖励: string;
            指定对象: string;
            执行者: string[];
            状态: '可接取' | '进行中' | '已完成';
          }
        }
      check:
        - 接取任务时从悬赏大厅或自选任务移动到进行中
        - 完成任务时移动到已完成并结算奖励
        - AI自动生成任务请求只进入操作队列，不直接新增任务，除非剧情明确生成

  成就系统:
    type: |-
      {
        [成就ID: string]: {
          名称: string;
          描述: string;
          进度: number;
          目标: number;
          奖励: string;
          已解锁: boolean;
        }
      }
    check:
      - 进度达到目标后已解锁设为 true
      - 成就名称、描述、奖励面向前端展示，保持中文

  操作队列:
    type: |-
      {
        id: string;
        类型: '购买' | '撤回购买' | '使用物品' | '丢弃物品' | '还债' | '接取任务' | '完成任务' | '拍摄企划' | '结束拍摄' | '日期推进' | 'AI任务生成';
        标题: string;
        详情: string;
        时间: string;
        可撤销: boolean;
        商品名: string;
        商品分类: string;
        数量: number;
        金额: number;
      }[]
    check:
      - 由前端交互写入，AI不主动清空
      - 仅保留最近12条
      - 购买操作撤销后可撤销设为 false
